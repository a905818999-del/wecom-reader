name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR (saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps (PEP 735)
        run: |
          python -m pip install --upgrade pip
          # `pip install --group dev` (PEP 735) requires pip 25.0+;
          # setuptools >=68 also supports this.
          pip install -e ".[all]"
          pip install --group dev

      - name: Lint (ruff)
        run: |
          ruff check wecom_reader tests
          ruff format --check wecom_reader tests

      - name: Test (pytest + coverage)
        env:
          # Real-data tests are skipped automatically if fixtures are absent.
          # Set WECOM_REAL_DATA=1 to opt into running them (CI does not).
          WECOM_REAL_DATA: "0"
        run: |
          pytest tests/ -v --tb=short \
            --cov=wecom_reader \
            --cov-report=xml \
            --cov-report=term-missing
        continue-on-error: false

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
